name: Publish to npm

on:
   release:
      types: [published]
   workflow_dispatch:

jobs:
   publish:
      runs-on: ubuntu-latest
      permissions:
         contents: read
         id-token: write # required for provenance
      steps:
         - uses: actions/checkout@v7
         - uses: actions/setup-node@v7
           with:
              node-version: 24.x
              registry-url: https://registry.npmjs.org
              package-manager-cache: false # never cache in release builds
         - run: npm install -g npm@latest # Trusted Publishing needs npm 11.5.1+
         - name: Show publish diagnostics
           run: |
              echo "github.repository = ${{ github.repository }}"
              echo "node = $(node --version)"
              echo "npm = $(npm --version)"
              echo "registry = $(npm config get registry)"
              test -n "$ACTIONS_ID_TOKEN_REQUEST_URL" && echo "OIDC request URL is available"
         - name: Verify version is not already published
           run: |
              PKG=$(node -p "require('./package.json').name")
              VER=$(node -p "require('./package.json').version")
              if npm view "$PKG@$VER" version >/dev/null 2>&1; then
                 echo "::error::$PKG@$VER is already published to npm. Bump the version before releasing."
                 exit 1
              fi
              echo "$PKG@$VER is not yet published — proceeding."
         - run: npm ci
         - run: npm publish --loglevel verbose
